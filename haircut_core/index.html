<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>HCR Web Twin</title>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: sans-serif; }
        #c { width: 100%; height: 100%; touch-action: none; display: block; }
    </style>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
    <canvas id="c"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script type="module">
    import init, { WebSimulator } from "./pkg/haircut_core.js";

    async function run() {
        const wasm = await init();

        const canvas = document.getElementById("c");
        const engine = new BABYLON.WebGPUEngine(canvas, { antialias: true, adaptToDeviceRatio: true });
        await engine.initAsync();

        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.07, 0.07, 0.07, 1);

        const cam = new BABYLON.ArcRotateCamera("cam", -Math.PI / 2, Math.PI / 2.4, 5, new BABYLON.Vector3(0.0, 0.7, 0.7), scene);
        cam.attachControl(canvas, true);

        new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0, 1, 0), scene);
        
        const head = BABYLON.MeshBuilder.CreateSphere("head", { diameter: 2, segments: 32 }, scene);
        head.scaling = new BABYLON.Vector3(0.75, 0.85, 0.85);
        head.position.set(0.0, 0.3, 0.7);
        const headMat = new BABYLON.StandardMaterial("headMat", scene);
        headMat.diffuseColor = new BABYLON.Color3(0.94, 0.78, 0.66);
        head.material = headMat;

        const clipperRadius = 0.12;
        const clipperMesh = BABYLON.MeshBuilder.CreateSphere("clipper", { diameter: clipperRadius * 2 }, scene);
        const clipperMat = new BABYLON.StandardMaterial("clipperMat", scene);
        clipperMat.diffuseColor = new BABYLON.Color3(1, 0.1, 0.1);
        clipperMesh.material = clipperMat;
        clipperMesh.position.set(1.0, 1.0, -0.06); 

        const floorY = -0.6; 
        const floor = BABYLON.MeshBuilder.CreateDisc("floor", { radius: 3 }, scene);
        floor.rotation.x = Math.PI / 2;
        floor.position.y = floorY;

        const simulator = new WebSimulator();

        const client = mqtt.connect('ws://127.0.0.1:8084'); 

        client.on('connect', function () {
            client.subscribe('twin/state/+');
        });

        client.on('message', function (topic, message) {
            const data = JSON.parse(message.toString());

            if (data.x !== undefined && data.y !== undefined && data.z !== undefined) {            
                simulator.update_clipper(data.x, data.y, data.z);
            }
        
            if (data.is_cutting !== undefined) {
                simulator.set_cutting(data.is_cutting);
            }

            if (data.hair_lengths && Array.isArray(data.hair_lengths)) {
            const lengthsArray = new Float32Array(data.hair_lengths);
            simulator.sync_server_lengths(lengthsArray);
            }
        });

        const totalHairStrands = 650;
        const nodesPerStrand = 12;
        const hairMeshes = [];
        
        simulator.step(); 
        const initPtr = simulator.get_hair_positions_ptr();
        const initLen = simulator.get_hair_positions_len();
        const initialPositions = new Float32Array(wasm.memory.buffer, initPtr, initLen);

        for (let s = 0; s < totalHairStrands; s++) {
            const pointsForMesh = [];
            for (let n = 0; n < nodesPerStrand; n++) {
                const idx = (s * nodesPerStrand + n) * 3;
                pointsForMesh.push(new BABYLON.Vector3(
                    initialPositions[idx],
                    initialPositions[idx + 1],
                    initialPositions[idx + 2]
                ));
            }
            const hairMesh = BABYLON.MeshBuilder.CreateLines("h_" + s, { points: pointsForMesh, updatable: true }, scene);
            hairMesh.color = new BABYLON.Color3(0.15, 0.15, 0.15);
            hairMeshes.push(hairMesh);
        }

        const debrisMeshes = [];
        engine.runRenderLoop(async () => {
            const startTime = performance.now();
            await simulator.step_async();
            const physicsTime = performance.now() - startTime;
            console.log(`FPS: ${engine.getFps().toFixed(1)} | Physics Time: ${physicsTime.toFixed(2)} ms`);

            const hPosPtr = simulator.get_hair_positions_ptr();
            const hPosLen = simulator.get_hair_positions_len();
            const updatedPositions = new Float32Array(wasm.memory.buffer, hPosPtr, hPosLen);

            const hLenPtr = simulator.get_hair_lengths_ptr();
            const lengths = new Float32Array(wasm.memory.buffer, hLenPtr, totalHairStrands);

            const dLenPtr = simulator.get_debris_lengths_ptr();
            const dCount = simulator.get_debris_count();
            const debrisLengths = new Uint32Array(wasm.memory.buffer, dLenPtr, dCount);

            let totalDebrisNumbers = 0;
            for (let i = 0; i < dCount; i++) {
                totalDebrisNumbers += debrisLengths[i] * 3;
            }
            const dPosPtr = simulator.get_debris_positions_ptr();
            const debrisPos = new Float32Array(wasm.memory.buffer, dPosPtr, totalDebrisNumbers);

            const cPos = simulator.get_clipper_position(); 
            clipperMesh.position.set(cPos[0], cPos[1], cPos[2]);

            let offset = 0;
            for (let s = 0; s < totalHairStrands; s++) {
                const updatedPoints = [];
                const activeNodes = lengths[s];
                let lastValidPoint = null;

                for (let n = 0; n < nodesPerStrand; n++) {
                    const currentPoint = new BABYLON.Vector3(
                        updatedPositions[offset],
                        updatedPositions[offset + 1],
                        updatedPositions[offset + 2]
                    );

                    if (n < activeNodes) {
                        lastValidPoint = currentPoint;
                        updatedPoints.push(lastValidPoint);
                    } else {
                        updatedPoints.push(lastValidPoint || currentPoint);
                    }
                    offset += 3;
                }
                
                if (activeNodes > 1) {
                    hairMeshes[s] = BABYLON.MeshBuilder.CreateLines(null, { 
                        points: updatedPoints, 
                        instance: hairMeshes[s] 
                    });
                    hairMeshes[s].isVisible = true;
                } else {
                    hairMeshes[s].isVisible = false;
                }
            }
            
            let flatIndex = 0;
            for (let i = 0; i < debrisLengths.length; i++) {
                const numPoints = debrisLengths[i];
                const pointsForDebris = [];
            
                for (let p = 0; p < numPoints; p++) {
                    pointsForDebris.push(new BABYLON.Vector3(
                        debrisPos[flatIndex],
                        debrisPos[flatIndex + 1],
                        debrisPos[flatIndex + 2]
                    ));
                    flatIndex += 3;
                }
            
                if (debrisMeshes[i]) {
                    debrisMeshes[i] = BABYLON.MeshBuilder.CreateLines(null, { 
                        points: pointsForDebris, 
                        instance: debrisMeshes[i] 
                    });
                } else {
                    const dMesh = BABYLON.MeshBuilder.CreateLines("debris_" + i, { 
                        points: pointsForDebris, 
                        updatable: true 
                    }, scene);

                    dMesh.color = new BABYLON.Color3(0.4, 0.4, 0.4); 
                    debrisMeshes.push(dMesh);
                }
            }
            scene.render();
        });

        window.addEventListener("resize", () => engine.resize());

    }

    run();
    </script>
</body>
</html>
